services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro

  ai-gateway:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.ai_gateway.main
    ports:
      - "8080:8080"
    env_file: ../.env
    depends_on:
      - agent-service
      - rag-service

  rag-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.rag_service.main
    ports:
      - "8081:8081"
    env_file: ../.env
    volumes:
      - chroma_data:/app/data/chroma

  agent-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.agent_service.main
    ports:
      - "8082:8082"
    env_file: ../.env
    environment:
      PORT: "8082"
    depends_on:
      - jira-service
      - reporting-service
      - rag-service

  jira-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.jira_service.main
    ports:
      - "8083:8083"
    env_file: ../.env
    environment:
      PORT: "8083"

  confluence-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.confluence_service.main
    ports:
      - "8084:8084"
    env_file: ../.env
    environment:
      PORT: "8084"

  github-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.github_service.main
    ports:
      - "8085:8085"
    env_file: ../.env
    environment:
      PORT: "8085"

  reporting-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        SERVICE_MODULE: cloud_run_services.reporting_service.main
    ports:
      - "8086:8086"
    env_file: ../.env
    environment:
      PORT: "8086"
    depends_on:
      - postgres

  frontend-ui:
    build:
      context: ../frontend-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - ai-gateway

volumes:
  pgdata:
  chroma_data:
